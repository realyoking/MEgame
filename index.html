<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game Entry</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: white;
            font-family: sans-serif;
            overflow: hidden;
            user-select: none;
        }

        .screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* Screen 1: Intro Logo */
        #screen1 img { max-width: 70%; max-height: 70%; object-fit: contain; }

        /* Screen 2: Disclaimer */
        #screen2 { background: white; padding: 2vh 5vw; box-sizing: border-box; }
        .warning-box {
            border: 2px solid black;
            padding: 1.5vh 2vw;
            max-width: 900px;
            max-height: 90vh; 
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .warning-box h2 { color: red; margin: 0 0 1vh 0; font-size: clamp(14px, 4vh, 24px); }
        .warning-box p { margin: 0.5vh 0; line-height: 1.2; font-size: clamp(10px, 2.8vh, 16px); }

        /* Screen 3: Cover */
        #screen3 {
            background-image: url('IMG_1259.png');
            background-size: cover;
            background-position: center;
            cursor: pointer;
        }
        .footer-text {
            position: absolute;
            bottom: 5vh;
            width: 100%;
            color: white;
            text-shadow: 2px 2px 5px black;
            font-size: 3vh;
            text-transform: uppercase;
            font-weight: bold;
        }

        /* Screen 4: Game Home Screen */
        #screen4 {
            background-image: url('HOMESCREEN_BG.png'); /* Change this in GitHub */
            background-size: cover;
            background-position: center;
        }

        /* UI Elements */
        .top-bar {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 50px;
            color: gold;
            font-weight: bold;
            font-size: 20px;
            display: flex;
            align-items: center;
            border: 2px solid gold;
        }

        .menu-buttons {
            position: absolute;
            right: 30px;
            bottom: 10%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .btn {
            background: #ffcc00;
            border: 4px solid #333;
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 10px;
            transition: transform 0.1s;
            box-shadow: 0 5px 0 #997a00;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #997a00;
        }

        /* Character Notification Popup */
        #char-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border: 5px solid gold;
            padding: 20px;
            z-index: 100;
            display: none;
            flex-direction: column;
            align-items: center;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <div id="screen1" class="screen" style="display: flex;" onclick="nextScreen(2)">
        <img src="IMG_8737.jpeg" alt="Logo">
    </div>

    <div id="screen2" class="screen" onclick="nextScreen(3)">
        <div class="warning-box">
            <h2>Important Legal Disclaimer and Warning</h2>
            <p><strong>This game is created strictly as a parody and satire.</strong></p>
            <p>Content for adult audiences only (18+).</p>
        </div>
    </div>

    <div id="screen3" class="screen" onclick="initGame()">
        <div class="footer-text">CLICK TO ENTER THE GAME...</div>
    </div>

    <div id="screen4" class="screen">
        <div class="top-bar">
            🪙 <span id="coin-count">0</span>
        </div>

        <div class="menu-buttons">
            <button class="btn" onclick="alert('Character Menu')">Character</button>
            <button class="btn" onclick="alert('Starting Game...')">Play</button>
        </div>
    </div>

    <div id="char-popup">
        <h2 style="margin:0">NEW CHARACTER UNLOCKED!</h2>
        <img id="unlocked-img" src="STARTER_CHAR.png" style="width:150px; height:150px; margin: 15px 0;">
        <h3 id="unlocked-name">Character Name</h3>
        <button class="btn" onclick="closePopup()">AWESOME</button>
    </div>

    <script>
        let currentScreen = 1;
        let userData = {
            coins: 100,
            hasCharacter: false,
            characterName: "The New Guy"
        };

        // Load data from local storage on startup
        function loadData() {
            const saved = localStorage.getItem('game_save');
            if (saved) {
                userData = JSON.parse(saved);
                document.getElementById('coin-count').innerText = userData.coins;
            }
        }

        function saveData() {
            localStorage.setItem('game_save', JSON.stringify(userData));
        }

        function nextScreen(num) {
            document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
            const target = document.getElementById('screen' + num);
            if (target) {
                target.style.display = 'flex';
                currentScreen = num;
                if (num === 2) {
                    setTimeout(() => { if(currentScreen === 2) nextScreen(3); }, 1500);
                }
            }
        }

        function initGame() {
            nextScreen(4);
            loadData();
            
            // If it's the first time getting a character
            if (!userData.hasCharacter) {
                userData.hasCharacter = true;
                userData.characterName = "Default Hero"; // CHANGE NAME HERE
                document.getElementById('unlocked-name').innerText = userData.characterName;
                document.getElementById('char-popup').style.display = 'flex';
                saveData();
            }
        }

        function closePopup() {
            document.getElementById('char-popup').style.display = 'none';
        }

        // Auto-advance screen 1
        setTimeout(() => { if(currentScreen === 1) nextScreen(2); }, 1500);
        
        // Initialize data on load
        loadData();
    </script>
</body>
</html>
